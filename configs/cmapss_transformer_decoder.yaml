experiment:
  name: fd002_transformer_decoder
  output_dir: outputs/fd002_transformer_decoder

data:
  name: cmapss
  data_dir: dataset/cmapss
  subset: FD002
  window_size: 64
  stride: 1
  evaluation_stride: 1
  rul_cap: 125.0
  val_fraction: 0.2
  variance_threshold: 1.0e-12
  split_seed: 42
  train_rul_filter:
    enabled: true
    normalized_range: [0.3, 1.0]
  options: {}

model:
  type: transformer
  architecture: decoder
  d_model: 64
  num_layers: 2
  num_heads: 4
  ffn_ratio: 4.0
  dropout: 0.1
  autoregressive:
    enabled: true
    loss: smooth_l1
    weight: 0.2

training:
  batch_size: 64
  epochs: 50
  patience: 10
  min_delta: 0.0
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  seed: 42
  device: auto
  num_workers: 0
  deterministic: true
  plots: true
  resume: null
  max_train_batches: null
  max_val_batches: null

evaluation:
  checkpoint: null
  device: auto
  num_workers: 0
  batch_size: null
  max_test_engines: null
  max_test_batches: null
  output: null
  predictions_output: null
  plot_output: null
  plots: true
