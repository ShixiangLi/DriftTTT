experiment:
  name: ncmapss_ds02_transformer_decoder
  output_dir: outputs/ncmapss_ds02_transformer_decoder

data:
  name: ncmapss
  data_dir: dataset/n-cmapss
  subset: DS02-006
  window_size: 1024
  stride: 64
  evaluation_stride: 32
  rul_cap: null
  val_fraction: 0.2
  variance_threshold: 1.0e-12
  split_seed: 42
  train_rul_filter:
    enabled: false
    normalized_range: [0.3, 1.0]
  options:
    feature_groups: [W, X_s]
    downsample_factor: 1
    window_boundary: flight
    validation_units: null

model:
  type: transformer
  architecture: decoder
  d_model: 64
  num_layers: 2
  num_heads: 4
  ffn_ratio: 4.0
  dropout: 0.1
  autoregressive:
    enabled: true
    loss: smooth_l1
    weight: 0.2

training:
  batch_size: 256
  epochs: 50
  patience: 10
  min_delta: 0.0
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  seed: 42
  device: auto
  num_workers: 8
  deterministic: false
  precision: auto
  compile: false
  plots: true
  resume: null
  max_train_batches: null
  max_val_batches: null

evaluation:
  checkpoint: null
  device: auto
  num_workers: 8
  batch_size: 256
  max_test_engines: null
  max_test_batches: null
  output: null
  predictions_output: null
  plot_output: null
  plots: true
